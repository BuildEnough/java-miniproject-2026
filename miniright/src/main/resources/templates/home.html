<!DOCTYPE html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: layout(~{::content}, ~{})}"
>
  <div th:fragment="content">

    <!-- 메인 배너 -->
    <section class="bg-dark text-white py-5 mb-5">
      <div class="container py-5">
        <h1 class="display-5 fw-bold">Community & Trade</h1>
        <p class="lead mb-4">
          자유롭게 소통하고, 필요한 물건을 거래할 수 있는 커뮤니티 플랫폼입니다.
        </p>

        <div class="d-flex gap-2">
          <a th:href="@{/bboard/list}" class="btn btn-success btn-lg">
            거래게시판 바로가기
          </a>

          <a th:href="@{/user/join}" class="btn btn-outline-light btn-lg"
             th:if="${session.loginUser == null}">
            회원가입
          </a>
        </div>
      </div>
    </section>

    <!-- 주요 기능 -->
    <section class="container mb-5">
      <div class="row g-4">

        <div class="col-md-6">
          <div class="card h-100 shadow-sm">
            <div class="card-body">
              <h5 class="card-title fw-bold">
                <i class="bi bi-chat-left-text-fill me-2"></i>
                자유게시판
              </h5>
              <p class="card-text text-muted">
                사용자들이 자유롭게 글을 작성하고 소통할 수 있는 게시판입니다.
              </p>
              <a th:href="@{/cboard/list}" class="btn btn-outline-primary">
                자유게시판 이동
              </a>
            </div>
          </div>
        </div>

        <div class="col-md-6">
          <div class="card h-100 shadow-sm">
            <div class="card-body">
              <h5 class="card-title fw-bold">
                <i class="bi bi-bag-check-fill me-2"></i>
                거래게시판
              </h5>
              <p class="card-text text-muted">
                삽니다, 팝니다, 예약중, 판매완료 상태로 거래글을 관리할 수 있습니다.
              </p>
              <a th:href="@{/bboard/list}" class="btn btn-outline-success">
                거래게시판 이동
              </a>
            </div>
          </div>
        </div>

      </div>
    </section>

  </div>
</html>

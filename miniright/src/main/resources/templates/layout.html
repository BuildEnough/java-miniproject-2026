<!doctype html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  th:fragment="layout(content, pageScripts)"
  data-bs-theme="auto"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Community & Trade</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" th:href="@{/css/community.css}" />
    <link rel="stylesheet" th:href="@{/css/carousel.css}" />

    <!-- Trumbowyg CSS -->
    <link
      rel="stylesheet"
      type="text/css"
      th:href="@{/trumbowyg/ui/trumbowyg.min.css}"
    />

    <script th:src="@{/js/color-modes.js}"></script>
  </head>

  <body class="d-flex flex-column min-vh-100">

    <!-- 네비게이션 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">Community & Trade</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarMenu"
          aria-controls="navbarMenu"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarMenu">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" th:href="@{/}">홈</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" th:href="@{/cboard/list}">자유게시판</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" th:href="@{/bboard/list}">거래게시판</a>
            </li>

            <li class="nav-item" th:if="${session.loginUser == null}">
              <a class="nav-link" th:href="@{/user/login}">로그인</a>
            </li>

            <li class="nav-item" th:if="${session.loginUser == null}">
              <a class="nav-link" th:href="@{/user/join}">회원가입</a>
            </li>
          </ul>

          <div
            th:if="${session.loginUser != null}"
            class="d-flex align-items-center gap-2"
          >
            <span class="text-light">
              <span th:text="${session.loginUser.name}">사용자</span>님 반갑습니다.
            </span>

            <form th:action="@{/user/logout}" method="post" class="m-0">
              <button type="submit" class="btn btn-sm btn-outline-light">
                로그아웃
              </button>
            </form>
          </div>
        </div>
      </div>
    </nav>

    <!-- 메인 콘텐츠 -->
    <main th:replace="${content}" class="flex-fill"></main>

    <!-- 푸터 -->
    <footer class="container mt-auto py-3 border-top">
      <p class="mb-0 text-muted">
        &copy; 2026 Community & Trade
      </p>
    </footer>

    <!-- Bootstrap JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

    <!-- jQuery -->
    <script
      src="https://code.jquery.com/jquery-3.7.1.min.js">
    </script>

    <!-- Trumbowyg -->
    <script th:src="@{/trumbowyg/trumbowyg.min.js}"></script>
    <script th:src="@{/trumbowyg/langs/ko.min.js}"></script>

    <!-- 페이지 개별 스크립트 -->
    <script th:replace="${pageScripts} ?: ~{}"></script>
  </body>
</html>

<!doctype html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  th:fragment="layout(content, pageScripts)"
  data-bs-theme="light"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Community & Trade</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" th:href="@{/css/community.css}" />
    <link rel="stylesheet" th:href="@{/css/carousel.css}" />

    <!-- Trumbowyg CSS -->
    <link
      rel="stylesheet"
      type="text/css"
      th:href="@{/trumbowyg/ui/trumbowyg.min.css}"
    />
  </head>

  <body class="d-flex flex-column min-vh-100">

    <!-- 네비게이션 -->
    <nav class="navbar navbar-expand-lg app-navbar">
      <div class="container-fluid px-4">
        <a class="navbar-brand" th:href="@{/}">
          <i class="bi bi-shop-window me-1"></i>
          Community & Trade
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarMenu"
          aria-controls="navbarMenu"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarMenu">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-3">
            <li class="nav-item">
              <a class="nav-link" th:href="@{/}">
                홈
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" th:href="@{/cboard/list}">
                자유게시판
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" th:href="@{/bboard/list}">
                거래게시판
              </a>
            </li>
          </ul>

          <div class="d-flex align-items-center gap-2">

            <!-- 다크모드 토글 -->
            <div class="dropdown">
              <button
                class="btn btn-sm btn-outline-secondary dropdown-toggle theme-toggle-btn"
                type="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                <i class="bi bi-circle-half me-1"></i>
                테마
              </button>

              <ul class="dropdown-menu dropdown-menu-end shadow-sm">
                <li>
                  <button class="dropdown-item theme-option" type="button" data-theme-value="light">
                    <i class="bi bi-sun me-2"></i>
                    라이트
                  </button>
                </li>
                <li>
                  <button class="dropdown-item theme-option" type="button" data-theme-value="dark">
                    <i class="bi bi-moon-stars me-2"></i>
                    다크
                  </button>
                </li>
                <li>
                  <button class="dropdown-item theme-option" type="button" data-theme-value="auto">
                    <i class="bi bi-circle-half me-2"></i>
                    시스템
                  </button>
                </li>
              </ul>
            </div>

            <!-- 비로그인 -->
            <div th:if="${session.loginUser == null}" class="d-flex gap-2">
              <a class="btn btn-sm btn-outline-secondary" th:href="@{/user/login}">
                로그인
              </a>

              <a class="btn btn-sm btn-primary" th:href="@{/user/join}">
                회원가입
              </a>
            </div>

            <!-- 로그인 -->
            <div
              th:if="${session.loginUser != null}"
              class="d-flex align-items-center gap-2"
            >
              <span class="login-user-text">
                <span th:text="${session.loginUser.name}">사용자</span>님
              </span>

              <form th:action="@{/user/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-sm btn-outline-secondary">
                  로그아웃
                </button>
              </form>
            </div>

          </div>
        </div>
      </div>
    </nav>

    <!-- 메인 콘텐츠 -->
    <main th:replace="${content}" class="flex-fill"></main>

    <!-- 푸터 -->
    <footer class="app-footer mt-auto">
      <div class="container d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 py-3">
        <div class="footer-title">
          Java Mini Project 2026
        </div>

        <div class="footer-links">
          <a href="https://github.com/BuildEnough/java-miniproject-2026"
             target="_blank"
             rel="noopener">
            GitHub Repository
          </a>

          <span class="footer-divider">·</span>

          <a href="https://github.com/BuildEnough/java-miniproject-2026/issues"
             target="_blank"
             rel="noopener">
            Issues
          </a>

          <span class="footer-divider">·</span>

          <a href="https://github.com/BuildEnough/java-miniproject-2026/wiki"
             target="_blank"
             rel="noopener">
            Wiki
          </a>
        </div>
      </div>
    </footer>

    <!-- Bootstrap JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

    <!-- jQuery -->
    <script
      src="https://code.jquery.com/jquery-3.7.1.min.js">
    </script>

    <!-- Trumbowyg -->
    <script th:src="@{/trumbowyg/trumbowyg.min.js}"></script>
    <script th:src="@{/trumbowyg/langs/ko.min.js}"></script>

    <!-- 다크모드 스크립트 -->
    <script>
      (function () {
        const STORAGE_KEY = "community-trade-theme";

        const getStoredTheme = () => localStorage.getItem(STORAGE_KEY);

        const setStoredTheme = (theme) => {
          localStorage.setItem(STORAGE_KEY, theme);
        };

        const getPreferredTheme = () => {
          const storedTheme = getStoredTheme();

          if (storedTheme) {
            return storedTheme;
          }

          return window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
        };

        const applyTheme = (theme) => {
          const targetTheme =
            theme === "auto"
              ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
              : theme;

          document.documentElement.setAttribute("data-bs-theme", targetTheme);

          document.querySelectorAll(".theme-option").forEach((button) => {
            button.classList.toggle("active", button.dataset.themeValue === theme);
          });
        };

        const currentTheme = getStoredTheme() || "light";
        applyTheme(currentTheme);

        document.querySelectorAll(".theme-option").forEach((button) => {
          button.addEventListener("click", () => {
            const theme = button.dataset.themeValue;
            setStoredTheme(theme);
            applyTheme(theme);
          });
        });

        window
          .matchMedia("(prefers-color-scheme: dark)")
          .addEventListener("change", () => {
            const storedTheme = getStoredTheme();
            if (storedTheme === "auto") {
              applyTheme("auto");
            }
          });
      })();
    </script>

    <!-- 페이지 개별 스크립트 -->
    <script th:replace="${pageScripts} ?: ~{}"></script>
  </body>
</html>

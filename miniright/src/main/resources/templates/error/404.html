<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>404 Not Found</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    body {
      min-height: 100vh;
      background: #f4f1ea;
      color: #2f3437;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
    }

    .error-card {
      width: 100%;
      max-width: 620px;
      background: #fffdf8;
      border: 1px solid #ded8cd;
      border-radius: 24px;
      padding: 48px;
      box-shadow: 0 18px 42px rgba(47, 52, 55, 0.12);
      text-align: center;
    }

    .error-code {
      font-size: 72px;
      font-weight: 900;
      color: #4f6f52;
      line-height: 1;
    }

    .error-title {
      font-size: 26px;
      font-weight: 800;
      margin-top: 20px;
    }

    .error-message {
      color: #74706a;
      margin-top: 12px;
      margin-bottom: 28px;
    }

    .btn-home {
      background: #4f6f52;
      border-color: #4f6f52;
      color: white;
      border-radius: 12px;
      font-weight: 700;
      padding: 10px 22px;
      text-decoration: none;
    }

    .btn-home:hover {
      background: #3f5c43;
      border-color: #3f5c43;
      color: white;
    }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-code">404</div>

    <div class="error-title">
      페이지를 찾을 수 없습니다
    </div>

    <p class="error-message">
      요청하신 주소가 존재하지 않거나 이동되었을 수 있습니다.<br />
      주소를 다시 확인해주세요.
    </p>

    <a th:href="@{/}" class="btn-home">
      홈으로 이동
    </a>
  </div>
</body>
</html>

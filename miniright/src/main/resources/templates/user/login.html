<!DOCTYPE html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: layout(~{::content}, ~{})}"
>
  <div th:fragment="content" class="container my-5" style="max-width: 600px">
    <h3 class="mb-4">로그인</h3>

    <form th:action="@{/user/login}" th:object="${userLoginForm}" method="post">

      <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
        <p th:each="err : ${#fields.globalErrors()}" th:text="${err}" class="mb-0"></p>
      </div>

      <div class="mb-3">
        <label for="loginId" class="form-label">아이디</label>
        <input
          type="text"
          id="loginId"
          th:field="*{loginId}"
          class="form-control"
          placeholder="아이디를 입력하세요"
        />
        <div class="text-danger mt-1" th:errors="*{loginId}"></div>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">패스워드</label>
        <input
          type="password"
          id="password"
          th:field="*{password}"
          class="form-control"
          placeholder="패스워드를 입력하세요"
        />
        <div class="text-danger mt-1" th:errors="*{password}"></div>
      </div>

      <button type="submit" class="btn btn-primary">
        로그인
      </button>

      <a th:href="@{/user/join}" class="btn btn-outline-secondary">
        회원가입
      </a>
    </form>
  </div>
</html>

<!DOCTYPE html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: layout(~{::content}, ~{::pageScripts})}"
>
  <div th:fragment="content" class="container my-3">
    <!-- 게시글 헤더 영역 -->
    <div class="border-bottom pb-2 mb-3">
      <h3 class="fw-bold" th:text="${post.title}">게시글 제목</h3>
      <div class="d-flex justify-content-between text-muted small">
        <div>
          <!-- 익명 여부에 따른 작성자 표시 -->
          <span class="fw-bold text-dark me-2">
            <i class="bi bi-person-circle"></i>
            <span th:text="${post.anonymous} ? '익명' : ${post.writerName}">작성자</span>
          </span>
          <span class="me-2">|</span>
          <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2024-05-20 10:00</span>
        </div>
        <div>
          <span class="me-2">조회수 <span th:text="${post.viewCount}">0</span></span>
        </div>
      </div>
    </div>

    <!-- 게시글 본문 영역 -->
    <div class="row mb-5">
      <div class="col">
        <!-- th:utext를 사용해야 Trumbowyg로 작성된 HTML 태그가 정상 적용됩니다 -->
        <div class="p-3 bg-white" style="min-height: 300px; line-height: 1.6;" th:utext="${post.content}">
          게시글 내용이 출력되는 곳입니다.
        </div>
      </div>
    </div>

    <!-- 하단 버튼 영역 -->
    <div class="row border-top pt-3">
      <div class="col">
        <a th:href="@{/board/list}" class="btn btn-sm btn-success">
          <i class="bi bi-list"></i> 목록
        </a>
      </div>
      <div class="col text-end">
        <!-- 본인 확인 로직(canEdit)이 있다고 가정 -->
        <th:block th:if="${canEdit}">
          <a th:href="@{|/board/edit/${post.boardId}|}" class="btn btn-sm btn-primary">
            <i class="bi bi-pencil-square"></i> 수정
          </a>
          <form th:action="@{|/board/delete/${post.boardId}|}" method="post" style="display:inline;" 
                onsubmit="return confirm('정말 삭제하시겠습니까?');">
            <button type="submit" class="btn btn-sm btn-danger">
              <i class="bi bi-trash"></i> 삭제
            </button>
          </form>
        </th:block>
      </div>
    </div>

    <h4>댓글 목록</h4>

    <!-- table-bordered : 테이블 경계선 -->
    <table class="table mt-3">
      <thead class="table-dark">
        <tr>
          <th style="width: 10%">번호</th>
          <th style="width: 45%">댓글 내용</th>
          <th style="width: 15%">작성자</th>
          <th style="width: 20%">작성일</th>
          <th style="width: 10%">삭제</th>
        </tr>
      </thead>
      <tbody>
        <tr th:if="${#lists.isEmpty(replyList)}">
          <td colspan="5" class="text-center">댓글이 없습니다.</td>
        </tr>
        <tr th:each="reply : ${replyList}">
          <td th:text="${reply.replyId}"></td>
          <td th:text="${reply.replyContent}"></td>
          <td th:text="${reply.replyWriter}"></td>
          <td
            th:text="${#temporals.format(reply.createdAt, 'yyyy-MM-dd HH:mm')}"
          ></td>
          <td>
            <form th:action="@{|/reply/delete/${reply.replyId}|}" method="post">
              <input type="hidden" name="boardId" th:value="${board.boardId}" />
              <button type="submit" class="btn btn-sm btn-outline-danger">
                <i class="bi bi-trash-fill"></i>
                삭제
              </button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>

    <!-- 댓글 작성 영역 -->

    <div class="row">
      <div class="col">
        <div th:if="${message}" class="alert alert-danger" th:text="${message}"></div>
        <form
          th:action="@{/reply/create}"
          th:object="${replyForm}"
          method="post"
          class="mt-3"
        >
          <input type="hidden" th:field="*{boardId}" />

          <div class="mb-3">
            <label for="replyWriter" class="form-label">작성자</label>
            <input
              type="text"
              id="replyWriter"
              th:field="*{replyWriter}"
              class="form-control"
            />
            <div class="text-danger mt-1" th:errors="*{replyWriter}"></div>
          </div>

          <div class="mb-3">
            <label for="replyContent" class="form-label">댓글 내용</label>
            <textarea
              id="replyContent"
              th:field="*{replyContent}"
              class="form-control"
              rows="2"
            ></textarea>
            <div class="text-danger mt-1" th:errors="*{replyContent}"></div>
          </div>

          <div class="text-end">
            <button type="submit" class="btn btn-sm btn-primary">
              <i class="bi bi-floppy"></i>
              댓글 등록
            </button>
          </div>
        </form>
      </div>
    </div>

  <script>
      // confirmDeleteBtn '예'를 클릭하면
      // 전체 페이지에서 deleteForm 아이디 폼태그를 찾아서 submit을 발동
      document
        .getElementById("confirmDeleteBtn")
        .addEventListener("click", function () {
          document.getElementById("deleteForm").submit();
        });
    </script>
</html>

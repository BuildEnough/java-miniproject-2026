<!doctype html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: layout(~{::content}, ~{})}"
>
  <div th:fragment="content" class="container my-4">
    <!-- 상단 배너 -->
    <section class="trade-hero mb-4">
      <div
        class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3"
      >
        <div>
          <h2 class="mb-2">자유게시판</h2>
          <p class="mb-0">자유롭게 이야기를 나누고 댓글로 의견을 남겨보세요.</p>
        </div>

        <div>
          <a th:href="@{/cboard/create}" class="btn btn-light btn-lg shadow-sm">
            <i class="bi bi-pencil-square me-1"></i>
            글쓰기
          </a>
        </div>
      </div>
    </section>

    <!-- 목록 상단 -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <p class="text-muted mb-0">
        총
        <span
          class="fw-bold"
          th:text="${pageResponse != null ? pageResponse.totalCount : 0}"
          >0</span
        >
        개의 게시글
      </p>
    </div>

    <!-- 목록 테이블 -->
    <div class="trade-table">
      <table class="table table-hover align-middle">
        <thead>
          <tr>
            <th class="text-center" style="width: 9%">번호</th>
            <th>제목</th>
            <th class="text-center" style="width: 14%">작성자</th>
            <th class="text-center" style="width: 10%">조회수</th>
            <th class="text-center" style="width: 18%">작성일</th>
          </tr>
        </thead>

        <tbody>
          <tr th:if="${#lists.isEmpty(cBoardList)}">
            <td colspan="5">
              <div class="empty-state text-center">
                <i class="bi bi-chat-square-text d-block mb-3"></i>
                <p class="mb-0">게시글이 없습니다.</p>
              </div>
            </td>
          </tr>

          <tr th:each="board : ${cBoardList}">
            <td
              class="text-center fw-bold text-muted"
              th:text="${board.postId}"
            >
              1
            </td>

            <td>
              <a
                th:href="@{|/cboard/detail/${board.postId}|}"
                th:text="${board.title}"
                class="trade-title-link"
              >
                제목
              </a>

              <span
                th:if="${board.replyCount != null and board.replyCount > 0}"
                class="category-badge badge-reserve ms-2"
                th:text="'댓글 ' + ${board.replyCount}"
              >
                댓글 0
              </span>
            </td>

            <td class="text-center" th:text="${board.writer}">작성자</td>

            <td class="text-center" th:text="${board.viewCount}">0</td>

            <td class="text-center text-muted">
              <span
                th:text="${board.createdAt != null ? #temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm') : '-'}"
              >
                -
              </span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- 페이징 -->
    <nav
      class="mt-4"
      th:if="${pageResponse != null and pageResponse.totalPage > 0}"
    >
      <ul class="pagination justify-content-center">
        <li
          class="page-item"
          th:classappend="${!pageResponse.prev} ? 'disabled'"
        >
          <a
            class="page-link"
            th:href="@{/cboard/list(page=${pageResponse.startPage - 1}, size=${pageResponse.size})}"
          >
            이전
          </a>
        </li>

        <li
          class="page-item"
          th:each="pageNum : ${#numbers.sequence(pageResponse.startPage, pageResponse.endPage)}"
          th:classappend="${pageNum == pageResponse.currentPage} ? 'active'"
        >
          <a
            class="page-link"
            th:href="@{/cboard/list(page=${pageNum}, size=${pageResponse.size})}"
            th:text="${pageNum}"
          >
            1
          </a>
        </li>

        <li
          class="page-item"
          th:classappend="${!pageResponse.next} ? 'disabled'"
        >
          <a
            class="page-link"
            th:href="@{/cboard/list(page=${pageResponse.endPage + 1}, size=${pageResponse.size})}"
          >
            다음
          </a>
        </li>
      </ul>
    </nav>
  </div>
</html>

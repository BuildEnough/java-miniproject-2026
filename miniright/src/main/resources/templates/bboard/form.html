<!DOCTYPE html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: layout(~{::content}, ~{::pageScripts})}"
>
  <div th:fragment="content" class="container my-5" style="max-width: 960px">

    <div class="form-page-card">
      <div class="mb-4">
        <h3 class="form-page-title mb-2"
            th:text="${bBoardForm != null and bBoardForm.postId != null} ? '거래게시글 수정' : '거래게시글 등록'">
          거래게시글 등록
        </h3>
        <p class="text-muted mb-0">
          거래할 물건의 제목, 카테고리, 내용을 입력해주세요.
        </p>
      </div>

      <form
        th:object="${bBoardForm}"
        th:action="${bBoardForm != null and bBoardForm.postId != null} ? @{|/bboard/edit/${bBoardForm.postId}|} : @{/bboard/create}"
        method="post"
      >
        <input type="hidden" th:field="*{postId}" />

        <div class="row g-3">
          <div class="col-md-8">
            <label for="title" class="form-label">제목</label>
            <input type="text"
                   id="title"
                   th:field="*{title}"
                   class="form-control form-control-lg"
                   placeholder="예) 키보드 판매합니다" />
            <div class="text-danger mt-1"
                 th:if="${#fields.hasErrors('title')}"
                 th:errors="*{title}">
            </div>
          </div>

          <div class="col-md-4">
            <label for="categoryId" class="form-label">카테고리</label>
            <select id="categoryId" th:field="*{categoryId}" class="form-select form-select-lg">
                <option value="">선택하세요</option>
                <option value="1">삽니다</option>
                <option value="2">팝니다</option>
                <option value="3">예약중</option>
                <option value="4">판매완료</option>
            </select>
            <div class="text-danger mt-1"
                 th:if="${#fields.hasErrors('categoryId')}"
                 th:errors="*{categoryId}">
            </div>
          </div>
        </div>

        <div class="mt-4">
          <label for="content" class="form-label">내용</label>
          <textarea id="content"
                    th:field="*{contents}"
                    class="form-control"
                    rows="12"
                    placeholder="거래할 물건의 상태, 가격, 거래 장소 등을 입력하세요."></textarea>
          <div class="text-danger mt-1"
               th:if="${#fields.hasErrors('contents')}"
               th:errors="*{contents}">
          </div>
        </div>

        <div class="d-flex justify-content-between align-items-center border-top pt-4 mt-4">
          <a th:href="@{/bboard/list}" class="btn btn-outline-secondary">
            목록으로
          </a>

          <button type="submit" class="btn btn-primary px-5">
            <i class="bi bi-check-circle me-1"></i>
            저장
          </button>
        </div>
      </form>
    </div>

  </div>

  <script th:fragment="pageScripts">
    $(function () {
      $("#content").trumbowyg({
        lang: "ko",
        btns: [
          ["strong", "em"],
          ["unorderedList", "orderedList"],
          ["link"],
          ["removeformat"]
        ]
      });
    });
  </script>
</html>

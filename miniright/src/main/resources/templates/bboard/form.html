<!DOCTYPE html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: layout(~{::content}, ~{::pageScripts})}"
>
  <div th:fragment="content" class="container my-3">
    <h3 class="fw-bold mb-4"
        th:text="${bboardForm != null and bboardForm.bPostId != null} ? '게시글 수정' : '게시글 등록'">
    </h3>

    <form
      th:object="${bboardForm}"
      th:action="${bboardForm != null and bboardForm.bPostId != null} ? @{|/bboard/edit/${bboardForm.bPostId}|} : @{/bboard/create}"
      method="post"
      enctype="multipart/form-data"
    >
      <input type="hidden" th:field="*{bPostId}" />

      <div class="mb-4">
        <label class="form-label fw-bold">게시글 이미지</label>
        <div class="d-flex flex-wrap gap-3" id="imagePreviewContainer">
          <div id="imagePreview" class="border d-flex align-items-center justify-content-center bg-light" 
               style="width: 150px; height: 150px; border-radius: 10px; overflow: hidden; cursor: pointer;"
               onclick="document.getElementById('imageFile').click();">
            <i class="bi bi-camera text-secondary fs-1" id="placeholderIcon"></i>
            <img id="previewImg" src="#" alt="미리보기" style="display: none; width: 100%; height: 100%; object-fit: cover;" />
          </div>
        </div>
        <input type="file" id="imageFile" name="imageFile" class="form-control d-none" accept="image/*" />
        <small class="text-muted mt-1 d-block">대표 이미지를 등록해주세요. (JPG, PNG, 최대 5MB)</small>
      </div>

      <div class="row">
        <div class="col-md-8 mb-3">
          <label for="title" class="form-label fw-bold">제목</label>
          <input type="text" id="title" th:field="*{title}" class="form-control" placeholder="제목을 입력하세요" />
          <div class="text-danger" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
        </div>

        <div class="col-md-4 mb-3">
          <label for="categoryId" class="form-label fw-bold">카테고리</label>
          <select id="categoryId" th:field="*{categoryId}" class="form-select">
              <option value="">선택하세요</option>
              <option value="1">공지사항</option>
              <option value="2">자유게시판</option>
              <option value="3">거래게시판</option>
          </select>
          <div class="text-danger" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></div>
        </div>
      </div>

      <div class="d-flex gap-4 mb-3 p-2 bg-light rounded">
        <div class="d-flex align-items-center gap-2">
            <label class="fw-bold small">거래 상태:</label>
            <select class="form-select form-select-sm" style="width: auto;">
                <option value="SELL">판매중</option>
                <option value="RESERVE">예약중</option>
                <option value="END">판매완료</option>
            </select>
        </div>
      </div>

      <div class="mb-3">
        <label for="content" class="form-label fw-bold">내용</label>
        <textarea id="content" th:field="*{bContent}" class="form-control" rows="10" placeholder="내용을 입력하세요"></textarea>
        <div class="text-danger" th:if="${#fields.hasErrors('bContent')}" th:errors="*{bContent}"></div>
      </div>

      <div class="text-end border-top pt-3">
        <a th:href="@{/bboard/list}" class="btn btn-outline-secondary">취소</a>
        <button type="submit" class="btn btn-primary px-5 shadow-sm">등록하기</button>
      </div>
    </form>
  </div>

  <script th:fragment="pageScripts">
    document.addEventListener("DOMContentLoaded", function () {
      const imagePreviewBox = document.getElementById("imagePreview");
      const fileInput = document.getElementById("imageFile");
      const previewImg = document.getElementById("previewImg");
      const placeholderIcon = document.getElementById("placeholderIcon");

      function previewFile(file) {
        if (!file || !file.type.startsWith("image/")) {
          return;
        }

        const reader = new FileReader();
        reader.onload = function (e) {
          previewImg.src = e.target.result;
          previewImg.style.display = "block";
          if (placeholderIcon) {
            placeholderIcon.style.display = "none";
          }
        };
        reader.readAsDataURL(file);
      }

      imagePreviewBox.addEventListener("click", function () {
        fileInput.click();
      });

      fileInput.addEventListener("change", function () {
        const file = this.files[0];
        previewFile(file);
      });
    });
  </script>
</html>

<!DOCTYPE html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: layout(~{::content}, ~{})}"
>
  <div th:fragment="content" class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h3 class="fw-bold">거래게시판</h3>
        <p class="text-muted mb-0">총
          <span class="fw-bold text-primary" th:text="${bBoardList.totalCount}">0</span>개의 상품이 있습니다.</p>
      </div>
      <a th:href="@{/bboard/create}" class="btn btn-primary shadow-sm">
        <i class="bi bi-plus-lg"></i> 내 물건 팔기
      </a>
    </div>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4 mb-5">
      <div class="col-12 w-100 text-center py-5" th:if="${#lists.isEmpty(bBoardList.dtoList)}">
        <i class="bi bi-bag-x display-1 text-muted"></i>
        <p class="mt-3 text-muted">등록된 매물이 없습니다. 첫 번째 주인공이 되어보세요!</p>
      </div>
      
      <div class="col" th:each="post : ${bBoardList.dtoList}">
        <div class="card h-100 border-0 shadow-sm hover-shadow transition">
          <div class="position-relative">
            <img th:src="${post.thumbnailUrl != null ? post.thumbnailUrl : 'https://via.placeholder.com/300x200?text=No+Image'}"
                 class="card-img-top" alt="상품 이미지"
                 style="height: 200px; object-fit: cover; border-radius: 0.5rem 0.5rem 0 0;">
            <div class="position-absolute top-0 start-0 m-2">
              <span th:if="${post.status == 'SELL'}" class="badge bg-primary">판매중</span>
              <span th:if="${post.status == 'RESERVE'}" class="badge bg-success">예약중</span>
              <span th:if="${post.status == 'END'}" class="badge bg-secondary">판매완료</span>
            </div>
          </div>
          
          <div class="card-body">
            <h5 class="card-title text-truncate mb-1">
              <a th:href="@{/bboard/detail/{id}(id=${post.postId})}"
                 class="text-decoration-none text-dark fw-bold"
                 th:text="${post.title}">상품 제목</a>
            </h5>
            
            <p class="card-text text-primary fw-bold mb-2"
               th:text="${post.price != null ? #numbers.formatInteger(post.price, 0, 'COMMA') + '원' : '가격 제안'}">
              0원
            </p>
            
            <div class="d-flex justify-content-between align-items-center">
              <small class="text-muted">
                <i class="bi bi-person-circle"></i>
                <span th:text="${post.anonymous ? '익명' : post.writerName}">작성자</span>
              </small>
              <small class="text-muted" th:text="${#temporals.format(post.createdAt, 'MM-dd')}">05-20</small>
            </div>
          </div>
          
          <div class="card-footer bg-transparent border-0 pt-0 pb-3">
            <div class="d-flex text-muted small">
              <span class="me-2">
                <i class="bi bi-eye"></i>
                <span th:text="${post.viewCount}">0</span>
              </span>
              <span>
                <i class="bi bi-chat-dots"></i> 0
              </span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <nav th:if="${!#lists.isEmpty(bBoardList.dtoList)}">
      <ul class="pagination justify-content-center">
        <li class="page-item" th:classappend="${!bBoardList.prev} ? 'disabled'">
          <a class="page-link" th:href="@{/bboard/list(page=${bBoardList.startPage - 1})}">이전</a>
        </li>
        <li class="page-item"
            th:each="pageNum : ${#numbers.sequence(bBoardList.startPage, bBoardList.endPage)}"
            th:classappend="${pageNum == bBoardList.currentPage} ? 'active'">
          <a class="page-link" th:href="@{/bboard/list(page=${pageNum})}" th:text="${pageNum}">1</a>
        </li>
        <li class="page-item" th:classappend="${!bBoardList.next} ? 'disabled'">
          <a class="page-link" th:href="@{/bboard/list(page=${bBoardList.endPage + 1})}">다음</a>
        </li>
      </ul>
    </nav>
  </div>

  <style>
    .hover-shadow:hover {
      transform: translateY(-5px);
      box-shadow: 0 .5rem 1rem rgba(0,0,0,.15)!important;
      transition: all 0.3s ease-in-out;
    }
    .transition { transition: all 0.3s ease-in-out; }
  </style>
</html>

<!DOCTYPE html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: layout(~{::content}, ~{})}"
>
<div th:fragment="content" class="container my-4">

    <!-- 상단 배너 -->
    <section class="trade-hero mb-4">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
            <div>
                <h2 class="mb-2">거래게시판</h2>
                <p class="mb-0">
                    필요한 물건을 찾고, 사용하지 않는 물건을 등록해보세요.
                </p>
            </div>

            <div>
                <a th:href="@{/bboard/create}" class="btn btn-light btn-lg shadow-sm">
                    <i class="bi bi-plus-circle me-1"></i>
                    내 물건 등록
                </a>
            </div>
        </div>
    </section>

    <!-- 검색 영역 -->
    <form th:action="@{/bboard/list}" method="get" th:object="${pageRequest}" class="search-box mb-4">
        <div class="card-body p-4">
            <input type="hidden" name="page" value="1" />
            <input type="hidden" name="size" th:value="*{size}" />

            <div class="row g-3 align-items-end">

                <div class="col-md-2">
                    <label for="categoryId" class="form-label">카테고리</label>
                    <select id="categoryId" name="categoryId" class="form-select">
                        <option value="">전체</option>
                        <option value="1" th:selected="${pageRequest.categoryId != null and pageRequest.categoryId == 1}">삽니다</option>
                        <option value="2" th:selected="${pageRequest.categoryId != null and pageRequest.categoryId == 2}">팝니다</option>
                        <option value="3" th:selected="${pageRequest.categoryId != null and pageRequest.categoryId == 3}">예약중</option>
                        <option value="4" th:selected="${pageRequest.categoryId != null and pageRequest.categoryId == 4}">판매완료</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <label for="startDate" class="form-label">시작일</label>
                    <input type="date"
                           id="startDate"
                           name="startDate"
                           class="form-control"
                           th:value="*{startDate}" />
                </div>

                <div class="col-md-2">
                    <label for="endDate" class="form-label">종료일</label>
                    <input type="date"
                           id="endDate"
                           name="endDate"
                           class="form-control"
                           th:value="*{endDate}" />
                </div>

                <div class="col-md-4">
                    <label for="keyword" class="form-label">검색어</label>
                    <input type="text"
                           id="keyword"
                           name="keyword"
                           class="form-control"
                           placeholder="제목 또는 내용으로 검색"
                           th:value="*{keyword}" />
                </div>

                <div class="col-md-2 d-grid">
                    <button type="submit" class="btn btn-dark">
                        <i class="bi bi-search me-1"></i>
                        검색
                    </button>
                </div>

                <div class="col-12 text-end">
                    <a th:href="@{/bboard/list}" class="btn btn-sm btn-outline-secondary">
                        검색 조건 초기화
                    </a>
                </div>
            </div>
        </div>
    </form>

    <!-- 목록 상단 -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <p class="text-muted mb-0">
            총
            <span class="fw-bold" th:text="${bBoardList.totalCount}">0</span>
            개의 게시글
        </p>
    </div>

    <!-- 목록 테이블 -->
    <div class="trade-table">
        <table class="table table-hover align-middle">
            <thead>
                <tr>
                    <th class="text-center" style="width: 9%;">번호</th>
                    <th class="text-center" style="width: 12%;">이미지</th>
                    <th class="text-center" style="width: 14%;">카테고리</th>
                    <th>제목</th>
                    <th class="text-center" style="width: 10%;">조회수</th>
                    <th class="text-center" style="width: 18%;">작성일</th>
                </tr>
            </thead>

            <tbody>
                <tr th:if="${#lists.isEmpty(bBoardList.dtoList)}">
                    <td colspan="6">
                        <div class="empty-state text-center">
                            <i class="bi bi-inbox d-block mb-3"></i>
                            <p class="mb-0">게시글이 없습니다.</p>
                        </div>
                    </td>
                </tr>

                <tr th:each="board : ${bBoardList.dtoList}">
                    <td class="text-center fw-bold text-muted" th:text="${board.postId}">1</td>

                    <td class="text-center">
                        <img th:if="${board.imagePath != null and board.imagePath != ''}"
                             th:src="@{${board.imagePath}}"
                             alt="썸네일"
                             style="width: 72px; height: 56px; object-fit: cover; border-radius: 12px;" />

                        <div th:if="${board.imagePath == null or board.imagePath == ''}"
                             class="d-inline-flex align-items-center justify-content-center"
                             style="width: 72px; height: 56px; border-radius: 12px; background: var(--accent-soft); color: var(--sub-text);">
                            <i class="bi bi-image"></i>
                        </div>
                    </td>

                    <td class="text-center">
                        <span th:switch="${board.categoryId}">
                            <span th:case="1" class="category-badge badge-buy">삽니다</span>
                            <span th:case="2" class="category-badge badge-sell">팝니다</span>
                            <span th:case="3" class="category-badge badge-reserve">예약중</span>
                            <span th:case="4" class="category-badge badge-done">판매완료</span>
                            <span th:case="*" class="category-badge badge-done">기타</span>
                        </span>
                    </td>

                    <td>
                        <div class="d-flex align-items-center gap-2 flex-wrap">
                            <a th:href="@{|/bboard/detail/${board.postId}|}"
                            th:text="${board.title}"
                            class="trade-title-link">
                                제목
                            </a>

                            <span th:if="${board.commentCount != null and board.commentCount > 0}"
                                class="d-inline-flex align-items-center px-3 py-1 rounded-pill"
                                style="font-size: 0.8rem;
                                        font-weight: 700;
                                        background-color: #f6dfc8;
                                        color: #9a5b24;
                                        border: 1px solid #efcfad;">
                                댓글&nbsp;
                                <span th:text="${board.commentCount}">
                                    0
                                </span>
                            </span>
                        </div>
                    </td>

                    <td class="text-center" th:text="${board.viewCount}">0</td>

                    <td class="text-center text-muted">
                        <span th:text="${board.createdAt != null ? #temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm') : '-'}">
                            -
                        </span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- 페이징 -->
    <nav class="mt-4" th:if="${bBoardList.totalCount > 0}">
        <ul class="pagination justify-content-center">

            <li class="page-item" th:classappend="${!bBoardList.prev} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/bboard/list(page=${bBoardList.startPage - 1}, size=${pageRequest.size}, keyword=${pageRequest.keyword}, startDate=${pageRequest.startDate}, endDate=${pageRequest.endDate}, categoryId=${pageRequest.categoryId})}">
                    이전
                </a>
            </li>

            <li class="page-item"
                th:each="pageNum : ${#numbers.sequence(bBoardList.startPage, bBoardList.endPage)}"
                th:classappend="${pageNum == bBoardList.currentPage} ? 'active'">
                <a class="page-link"
                   th:href="@{/bboard/list(page=${pageNum}, size=${pageRequest.size}, keyword=${pageRequest.keyword}, startDate=${pageRequest.startDate}, endDate=${pageRequest.endDate}, categoryId=${pageRequest.categoryId})}"
                   th:text="${pageNum}">
                    1
                </a>
            </li>

            <li class="page-item" th:classappend="${!bBoardList.next} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/bboard/list(page=${bBoardList.endPage + 1}, size=${pageRequest.size}, keyword=${pageRequest.keyword}, startDate=${pageRequest.startDate}, endDate=${pageRequest.endDate}, categoryId=${pageRequest.categoryId})}">
                    다음
                </a>
            </li>

        </ul>
    </nav>

</div>
</html>

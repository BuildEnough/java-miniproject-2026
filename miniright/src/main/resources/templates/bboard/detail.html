<!DOCTYPE html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: layout(~{::content}, ~{})}"
>
<div th:fragment="content" class="container my-4">

  <div th:if="${bboard != null}">
    <h3 class="mb-4">거래게시판 상세</h3>

    <table class="table table-bordered">
      <thead class="table-dark">
        <tr>
          <th colspan="2" class="text-center" th:text="${bboard.title}">
            제목
          </th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <th style="width: 15%;">번호</th>
          <td th:text="${bboard.postId}">1</td>
        </tr>

        <tr>
          <th>카테고리</th>
          <td>
            <span th:switch="${bboard.categoryId}">
              <span th:case="1">삽니다</span>
              <span th:case="2">팝니다</span>
              <span th:case="3">예약중</span>
              <span th:case="4">판매완료</span>
              <span th:case="*">기타</span>
            </span>
          </td>
        </tr>

        <tr>
          <th>조회수</th>
          <td th:text="${bboard.viewCount}">0</td>
        </tr>

        <tr>
          <th>작성일</th>
          <td th:text="${#temporals.format(bboard.createdAt, 'yyyy-MM-dd HH:mm')}">
            2026-05-07
          </td>
        </tr>

        <tr>
          <th>수정일</th>
          <td th:text="${bboard.updatedAt != null ? #temporals.format(bboard.updatedAt, 'yyyy-MM-dd HH:mm') : '-'}">
            -
          </td>
        </tr>

        <tr>
          <th>내용</th>
          <td th:utext="${bboard.contents}">
            내용
          </td>
        </tr>
      </tbody>
    </table>

    <div class="text-end">
      <a th:href="@{/bboard/list}" class="btn btn-sm btn-success">
        목록
      </a>

      <a th:href="@{|/bboard/edit/${bboard.postId}|}" class="btn btn-sm btn-warning">
        수정
      </a>

      <form th:action="@{|/bboard/delete/${bboard.postId}|}"
            method="post"
            style="display: inline"
            onsubmit="return confirm('정말 삭제하시겠습니까?');">
        <button type="submit" class="btn btn-sm btn-danger">
          삭제
        </button>
      </form>
    </div>
  </div>

</div>
</html>

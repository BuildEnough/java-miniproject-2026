<!DOCTYPE html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: layout(~{::content}, ~{::pageScripts})}"
>
  <div th:fragment="content" class="container my-4">
    
    <!-- 상단: 상품 핵심 정보 영역 -->
    <div class="row g-4 mb-5">
      <!-- 1. 상품 이미지 영역 -->
      <div class="col-md-6">
        <div class="card border-0 shadow-sm overflow-hidden" style="border-radius: 15px;">
          <img th:src="${post.thumbnailUrl != null ? post.thumbnailUrl : 'https://via.placeholder.com/600x500?text=No+Image'}" 
               class="img-fluid" alt="상품 이미지" style="width: 100%; height: 500px; object-fit: cover;">
        </div>
      </div>

      <!-- 2. 판매 정보 및 버튼 영역 -->
      <div class="col-md-6 d-flex flex-column justify-content-between">
        <div>
          <div class="d-flex justify-content-between align-items-center mb-2">
            <nav aria-label="breadcrumb">
              <ol class="breadcrumb mb-0">
                <li class="breadcrumb-item text-primary" th:text="${post.categoryName}">가전제품</li>
                <li class="breadcrumb-item active" th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}">작성일</li>
              </ol>
            </nav>
            <span class="badge" 
                  th:classappend="${post.status == 'SELL'} ? 'bg-primary' : (${post.status == 'RESERVE'} ? 'bg-success' : 'bg-secondary')"
                  th:text="${post.status == 'SELL' ? '판매중' : (post.status == 'RESERVE' ? '예약중' : '판매완료')}">
            </span>
          </div>

          <h2 class="fw-bold mb-3" th:text="${post.title}">아이패드 에어 5세대 판매합니다</h2>
          
          <!-- 가격 정보 -->
          <h3 class="text-danger fw-bold mb-4">
            <span th:text="${post.price != null ? #numbers.formatInteger(post.price, 0, 'COMMA') : '0'}">0</span>원
          </h3>

          <hr />

          <!-- 판매자 정보 (익명 처리 포함) -->
          <div class="d-flex align-items-center mb-4">
            <div class="bg-light rounded-circle p-3 me-3">
              <i class="bi bi-person-fill fs-3 text-secondary"></i>
            </div>
            <div>
              <div class="fw-bold fs-5" th:text="${post.writerName}">작성자</div>
            </div>
          </div>
        </div>

        <!-- 구매/수정 버튼 영역 -->
        <div class="d-grid gap-2">
          <!-- 작성자가 아닐 때: 채팅/문의하기 -->
          <div th:if="${#authentication.getPrincipal().getUserId != post.userId}" class="d-flex gap-2">
            <a href="#comment-section" class="btn btn-primary flex-grow-1 fs-5 py-2">문의 댓글 작성</a>
          </div>

          <!-- 작성자일 때: 수정/삭제 -->
          <div th:if="${canEdit}" class="d-flex gap-2">
            <a th:href="@{|/studypost/edit/${post.postId}|}" class="btn btn-outline-primary flex-grow-1">수정하기</a>
            <form th:action="@{|/studypost/delete/${post.postId}|}" method="post" class="flex-grow-1" onsubmit="return confirm('정말 삭제하시겠습니까?');">
              <button type="submit" class="btn btn-outline-danger w-100">삭제</button>
            </form>
          </div>
          
          <a th:href="@{/studypost/list}" class="btn btn-light">목록으로</a>
        </div>
      </div>
    </div>

    <!-- 하단: 상세 내용 -->
    <div class="row">
      <div class="col-12">
        <div class="card border-0 bg-light p-4 mb-5" style="border-radius: 15px;">
          <h5 class="fw-bold mb-3 border-bottom pb-2">상품 상세 정보</h5>
          <div class="card-text text-dark" th:utext="${post.content}" style="min-height: 200px; line-height: 1.8;"></div>
        </div>
      </div>
    </div>

    <!-- 댓글(거래 문의) 섹션 -->
    <div id="comment-section" class="card border-0 shadow-sm p-4" style="border-radius: 15px;">
      <h4 class="fw-bold mb-4"><i class="bi bi-chat-left-dots-fill me-2"></i>거래 문의</h4>

    <!-- table-bordered : 테이블 경계선 -->
    <table class="table mt-3">
      <thead class="table-dark">
        <tr>
          <th style="width: 10%">번호</th>
          <th style="width: 45%">댓글 내용</th>
          <th style="width: 15%">작성자</th>
          <th style="width: 20%">작성일</th>
          <th style="width: 10%">삭제</th>
        </tr>
      </thead>
      <tbody>
        <tr th:if="${#lists.isEmpty(replyList)}">
          <td colspan="5" class="text-center">댓글이 없습니다.</td>
        </tr>
        <tr th:each="reply : ${replyList}">
          <td th:text="${reply.replyId}"></td>
          <td th:text="${reply.replyContent}"></td>
          <td th:text="${reply.replyWriter}"></td>
          <td
            th:text="${#temporals.format(reply.createdAt, 'yyyy-MM-dd HH:mm')}"
          ></td>
          <td>
            <form th:action="@{|/reply/delete/${reply.replyId}|}" method="post">
              <input type="hidden" name="boardId" th:value="${board.boardId}" />
              <button type="submit" class="btn btn-sm btn-outline-danger">
                <i class="bi bi-trash-fill"></i>
                삭제
              </button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>

    <!-- 댓글 작성 영역 -->

    <div class="row">
      <div class="col">
        <div th:if="${message}" class="alert alert-danger" th:text="${message}"></div>
        <form
          th:action="@{/reply/create}"
          th:object="${replyForm}"
          method="post"
          class="mt-3"
        >
          <input type="hidden" th:field="*{boardId}" />

          <div class="mb-3">
            <label for="replyWriter" class="form-label">작성자</label>
            <input
              type="text"
              id="replyWriter"
              th:field="*{replyWriter}"
              class="form-control"
            />
            <div class="text-danger mt-1" th:errors="*{replyWriter}"></div>
          </div>

          <div class="mb-3">
            <label for="replyContent" class="form-label">댓글 내용</label>
            <textarea
              id="replyContent"
              th:field="*{replyContent}"
              class="form-control"
              rows="2"
            ></textarea>
            <div class="text-danger mt-1" th:errors="*{replyContent}"></div>
          </div>

          <div class="text-end">
            <button type="submit" class="btn btn-sm btn-primary">
              <i class="bi bi-floppy"></i>
              댓글 등록
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- 이 태그는 버튼누를시만 표시 -->
    <!-- 삭제 확인 모달 -->
    <div
      class="modal fade"
      id="deleteModal"
      tabindex="-1"
      aria-labelledby="deleteModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="deleteModalLabel">삭제 확인</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>

          <div class="modal-body">삭제하시겠습니까?</div>

          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-sm btn-danger"
              id="confirmDeleteBtn"
            >
              예
            </button>

            <button
              type="button"
              class="btn btn-sm btn-secondary"
              data-bs-dismiss="modal"
            >
              아니오
            </button>
          </div>
        </div>
      </div>
    </div>
     

  <script th:fragment="pageScripts"></script>
</html>

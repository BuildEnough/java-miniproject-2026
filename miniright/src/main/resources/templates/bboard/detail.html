<!DOCTYPE html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: layout(~{::content}, ~{})}"
>
<div th:fragment="content" class="container my-5" style="max-width: 960px">

  <div th:if="${bboard != null}">

    <!-- 제목 영역 -->
    <section class="detail-title-box mb-4">
      <div class="mb-3">
        <span th:switch="${bboard.categoryId}">
          <span th:case="1" class="category-badge badge-buy">삽니다</span>
          <span th:case="2" class="category-badge badge-sell">팝니다</span>
          <span th:case="3" class="category-badge badge-reserve">예약중</span>
          <span th:case="4" class="category-badge badge-done">판매완료</span>
          <span th:case="*" class="category-badge badge-done">기타</span>
        </span>
      </div>

      <h2 class="detail-title mb-3" th:text="${bboard.title}">
        게시글 제목
      </h2>

      <div class="detail-meta d-flex flex-wrap gap-3">
        <span>
          <i class="bi bi-hash"></i>
          번호 <span th:text="${bboard.postId}">1</span>
        </span>

        <span>
          <i class="bi bi-eye"></i>
          조회수 <span th:text="${bboard.viewCount}">0</span>
        </span>

        <span>
          <i class="bi bi-calendar3"></i>
          작성일
          <span th:text="${bboard.createdAt != null ? #temporals.format(bboard.createdAt, 'yyyy-MM-dd HH:mm') : '-'}">
            -
          </span>
        </span>

        <span th:if="${bboard.updatedAt != null}">
          <i class="bi bi-pencil-square"></i>
          수정일
          <span th:text="${#temporals.format(bboard.updatedAt, 'yyyy-MM-dd HH:mm')}">
            -
          </span>
        </span>
      </div>
    </section>

    <!-- 이미지 영역 -->
    <section class="mb-4" th:if="${bboard.imagePath != null and bboard.imagePath != ''}">
      <img th:src="@{${bboard.imagePath}}"
           alt="게시글 이미지"
           style="width: 100%; max-height: 480px; object-fit: cover; border-radius: 24px; border: 1px solid var(--border-color);" />
    </section>

    <!-- 내용 영역 -->
    <section class="detail-content mb-4">
      <div th:utext="${bboard.contents}">
        내용
      </div>
    </section>

    <!-- 댓글 영역 -->
    <section class="detail-content mb-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-bold mb-0">
          댓글
          <span class="text-muted small" th:text="${commentList != null ? commentList.size() : 0}">
            0
          </span>
        </h5>
      </div>

      <!-- 댓글 작성 -->
      <div th:if="${session.loginUser != null}" class="mb-4">
        <form th:action="@{|/bboard/detail/${bboard.postId}/comments|}"
              method="post">
          <div class="mb-2">
            <textarea name="contents"
                      class="form-control"
                      rows="3"
                      placeholder="거래 문의 댓글을 입력하세요."></textarea>
          </div>

          <div class="text-end">
            <button type="submit" class="btn btn-primary">
              댓글 등록
            </button>
          </div>
        </form>
      </div>

      <!-- 비로그인 안내 -->
      <div th:if="${session.loginUser == null}" class="alert alert-light border">
        댓글을 작성하려면 로그인이 필요합니다.
      </div>

      <!-- 댓글 없음 -->
      <div th:if="${#lists.isEmpty(commentList)}" class="text-muted text-center py-4">
        아직 등록된 댓글이 없습니다.
      </div>

      <!-- 댓글 목록 -->
      <div th:each="comment : ${commentList}" class="border-top py-3">
        <div class="d-flex justify-content-between align-items-start gap-3">
          <div>
            <div class="fw-bold mb-1" th:text="${comment.writerName}">
              작성자
            </div>

            <div class="mb-2" style="white-space: pre-wrap;" th:text="${comment.contents}">
              댓글 내용
            </div>

            <div class="text-muted small">
              <span th:text="${comment.createdAt != null ? #temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm') : '-'}">
                -
              </span>
            </div>
          </div>

          <!-- 댓글 작성자 본인만 삭제 가능 -->
          <form th:if="${session.loginUser != null and session.loginUser.userId == comment.userId}"
                th:action="@{|/bboard/detail/${bboard.postId}/comments/${comment.commentId}/delete|}"
                method="post"
                onsubmit="return confirm('댓글을 삭제하시겠습니까?');">
            <button type="submit" class="btn btn-sm btn-outline-danger">
              삭제
            </button>
          </form>
        </div>
      </div>
    </section>

    <!-- 버튼 영역 -->
    <div class="d-flex justify-content-between align-items-center">
      <a th:href="@{/bboard/list}" class="btn btn-outline-secondary">
        <i class="bi bi-list-ul me-1"></i>
        목록
      </a>

      <!-- 작성자 본인만 수정/삭제 가능 -->
      <div class="d-flex gap-2" th:if="${isOwner}">
        <a th:href="@{|/bboard/edit/${bboard.postId}|}" class="btn btn-warning">
          <i class="bi bi-pencil-square me-1"></i>
          수정
        </a>

        <form th:action="@{|/bboard/delete/${bboard.postId}|}"
              method="post"
              onsubmit="return confirm('정말 삭제하시겠습니까?');">
          <button type="submit" class="btn btn-danger">
            <i class="bi bi-trash me-1"></i>
            삭제
          </button>
        </form>
      </div>

      <!-- 로그인하지 않은 사용자 -->
      <div th:if="${session.loginUser == null}" class="text-muted small">
        수정과 삭제는 로그인 후 이용할 수 있습니다.
      </div>

      <!-- 로그인했지만 작성자가 아닌 사용자 -->
      <div th:if="${session.loginUser != null and !isOwner}" class="text-muted small">
        작성자만 수정과 삭제를 할 수 있습니다.
      </div>
    </div>

  </div>

</div>
</html>
